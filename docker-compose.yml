name: cryptopay-brasil

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptopay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - cryptopay_postgres_data:/var/lib/postgresql/data
    networks:
      - cryptopay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cryptopay-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - cryptopay_redis_data:/data
    networks:
      - cryptopay-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: development
    container_name: cryptopay-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./apps/api:/app
      - cryptopay_api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cryptopay-network
    command: sh -c "npx prisma migrate deploy && npm run start:dev"

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
      target: development
    container_name: cryptopay-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - cryptopay_web_node_modules:/app/node_modules
      - cryptopay_web_next:/app/.next
    depends_on:
      - api
    networks:
      - cryptopay-network
    command: sh -c "npm run dev"

networks:
  cryptopay-network:
    driver: bridge

volumes:
  cryptopay_postgres_data:
  cryptopay_redis_data:
  cryptopay_api_node_modules:
  cryptopay_web_node_modules:
  cryptopay_web_next:
