name: cryptopay-brasil-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptopay-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cryptopay_postgres_data:/var/lib/postgresql/data
    networks:
      - cryptopay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: cryptopay-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - cryptopay_redis_data:/data
    networks:
      - cryptopay-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infra/docker/Dockerfile.api
      target: production
    image: cryptopay-brasil/api:latest
    container_name: cryptopay-api
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cryptopay-network
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/Dockerfile.web
      target: production
    image: cryptopay-brasil/web:latest
    container_name: cryptopay-web
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - cryptopay-network
    command: sh -c "node server.js"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: cryptopay-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - cryptopay_certbot_www:/var/www/certbot
    depends_on:
      - api
      - web
    networks:
      - cryptopay-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  certbot:
    image: certbot/certbot:latest
    container_name: cryptopay-certbot
    volumes:
      - ./infra/nginx/ssl:/etc/letsencrypt
      - cryptopay_certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - cryptopay-network

networks:
  cryptopay-network:
    driver: bridge

volumes:
  cryptopay_postgres_data:
  cryptopay_redis_data:
  cryptopay_certbot_www:
